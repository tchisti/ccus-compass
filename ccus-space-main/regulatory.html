<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regulatory Hub — CCUS Compass</title>
<script>
/* Apply theme before CSS renders to avoid flash */
(function(){var t=localStorage.getItem('ccus-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
</script>
<script src="ccus-nav.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #070f0a; --surface: #0b180f; --border: #1a2e1f;
    --green: #2d6b4a; --green-bright: #7ddfb0;
    --text: #c8ddd0; --text-dim: #4a6a58;
  }
  html[data-theme="light"] {
    --bg: #f0ede4; --surface: #faf8f2; --border: #c8b89a;
    --green: #2d6b4a; --green-bright: #2d6b4a;
    --text: #1a1810; --text-dim: #7a6a50;
  }

  body {
    font-family: 'JetBrains Mono', 'Segoe UI', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Tab bar ── */
  .tab-bar {
    height: 46px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
    transition: background .25s, border-color .25s;
  }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 18px;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.82em;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--green-bright); border-bottom-color: var(--green-bright); }

  .tab-badge {
    font-size: 0.72em; padding: 1px 6px; border-radius: 10px;
    background: rgba(125,223,176,0.1); color: var(--text-dim); border: 1px solid var(--border);
  }
  html[data-theme="light"] .tab-badge { background: rgba(45,107,74,0.08); }
  .tab-btn.active .tab-badge { background: rgba(125,223,176,0.12); color: var(--green-bright); border-color: var(--green); }

  /* ── Iframe container ── */
  .frame-wrap { flex: 1; position: relative; overflow: hidden; }
  .frame-panel { position: absolute; inset: 0; display: none; }
  .frame-panel.active { display: block; }
  .frame-panel iframe { width: 100%; height: 100%; border: none; display: block; }

  /* Loading overlay */
  .frame-loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: var(--bg); z-index: 5; pointer-events: none; transition: opacity 0.3s;
  }
  .frame-loading.hidden { opacity: 0; }
  .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--green);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .frame-loading p { font-size: 0.8em; color: var(--text-dim); }
</style>
</head>
<body>

<!-- Tab bar (ccus-nav.js injects the top nav bar above this) -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="us">
    🇺🇸 US Class VI <span class="tab-badge">6 Primacy States</span>
  </button>
  <button class="tab-btn" data-tab="canada">
    🍁 Canada <span class="tab-badge">4 Provinces</span>
  </button>
  <button class="tab-btn" data-tab="aer">
    📋 AER D065 <span class="tab-badge">Alberta Toolkit</span>
  </button>
</div>

<!-- Iframe panels -->
<div class="frame-wrap">

  <div class="frame-panel active" id="panel-us">
    <div class="frame-loading" id="loading-us">
      <div class="spinner"></div>
      <p>Loading US Class VI Dashboard…</p>
    </div>
    <iframe src="us-regulatory.html" title="US CCS Regulatory Dashboard"
      onload="hideLoader('loading-us')"></iframe>
  </div>

  <div class="frame-panel" id="panel-canada">
    <div class="frame-loading" id="loading-canada">
      <div class="spinner"></div>
      <p>Loading Canadian CCS Regulatory Guide…</p>
    </div>
    <iframe src="canada-regulatory.html" title="Canadian CCS Regulatory Guide"
      onload="hideLoader('loading-canada')" loading="lazy"></iframe>
  </div>

  <div class="frame-panel" id="panel-aer">
    <div class="frame-loading" id="loading-aer">
      <div class="spinner"></div>
      <p>Loading AER D065 Assistant…</p>
    </div>
    <iframe src="aer-d065.html" title="AER D065 Assistant"
      onload="hideLoader('loading-aer')" loading="lazy"></iframe>
  </div>

</div>

<script>
  // Tab switching
  var tabs   = document.querySelectorAll('.tab-btn');
  var panels = document.querySelectorAll('.frame-panel');

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      var target = tab.dataset.tab;
      tabs.forEach(function(t) { t.classList.remove('active'); });
      panels.forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('panel-' + target).classList.add('active');
    });
  });

  function hideLoader(id) {
    var el = document.getElementById(id);
    if (el) el.classList.add('hidden');
  }

  // When ccus-nav.js toggles theme on this page, propagate to all iframes
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ccus-theme') {
      // ccus-nav.js handles applying to self; just forward to all iframes
      document.querySelectorAll('iframe').forEach(function(f) {
        try { f.contentWindow.postMessage({ type: 'ccus-theme', theme: e.data.theme }, '*'); } catch(ex) {}
      });
    }
  });
</script>
</body>
</html>
