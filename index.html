    function co2PhaseCalc(Tc, PMPa) {
      const Tcrit = 31.1, Pcrit = 7.38, Tt = -56.6, Pt = 0.518;
      if (Tc < Tt) return { phase: PMPa > Pt ? 'Solid' : 'Solid/Vapour', col:'#a0b8ff' };
      if (Tc >= Tcrit && PMPa >= Pcrit) return { phase:'Supercritical', col:'#7ddfb0' };
      const Psat = Math.pow(10, 8.11814 - 1034.66/(Tc + 272.66)) / 10;
      if (Tc < Tcrit && PMPa >= Psat) return { phase:'Liquid', col:'#60b0ff' };
      return { phase:'Gas', col:'#ffb060' };
    }
    function co2DensityCalc(Tc, PMPa, phase) {
      const TK = Tc + 273.15;
      if (phase === 'Gas') return Math.round(PMPa * 1e6 * 0.04401 / (8.314 * TK));
      if (phase === 'Liquid') {
        const Psat = Math.pow(10, 8.11814 - 1034.66/(Tc + 272.66)) / 10;
        return Math.round(980 - 7*Tc + (PMPa - Psat)*5);
      }
      if (phase === 'Supercritical') {
        const Tr = TK / 304.25, Pr = PMPa / 7.38;
        if (Tr < 1.08) return Math.round(467 * 2.6 * Pr / (1 + 7*(Tr-1) + 1.4*Pr));
        return Math.round(467 * 1.6 * Pr / (Tr*Tr + 0.55*Pr));
      }
      return null;
    }

      const labelStyle = { color:'#a09060', fontSize:'0.78em', display:'block', marginBottom:4 };

      const resultBox  = { background:'#1a1600', border:'1px solid '+GOLD_BORDER, borderRadius:8, padding:14, marginTop:12 };

      function fmt$(n){ return n>=1e9?'$'+(n/1e9).toFixed(2)+'B':n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+Math.round(n); }

      function calcIRR(cfs){
        let lo=-0.999,hi=10;
        for(let i=0;i<300;i++){
          const mid=(lo+hi)/2;
          const npv=cfs.reduce((s,c,t)=>s+c/Math.pow(1+mid,t),0);
          if(Math.abs(hi-lo)<1e-8)break;
          if(npv>0)lo=mid;else hi=mid;
        }
        return(lo+hi)/2;
      }
      function calcNPV(cfs,r){ return cfs.reduce((s,c,t)=>s+c/Math.pow(1+r/100,t),0); }

      /* ── Tool 3: Project Finance DCF ── */
      function DCFTool(){
        const [co2tpy,setCo2tpy]=useState(500000);
        const [projLife,setProjLife]=useState(25);
        const [constYrs,setConstYrs]=useState(3);
        const [cxCapture,setCxCapture]=useState(400);
        const [cxPipe,setCxPipe]=useState(80);
        const [cxInj,setCxInj]=useState(60);
        const [contingency,setContingency]=useState(20);
        const [opexT,setOpexT]=useState(35);
        const [monit,setMonit]=useState(2);
        const [r45q,setR45q]=useState(85);
        const [tierR,setTierR]=useState(0);
        const [vcmR,setVcmR]=useState(0);
        const [eqPct,setEqPct]=useState(40);
        const [dRate,setDRate]=useState(6.5);
        const [dTerm,setDTerm]=useState(18);
        const [wacc,setWacc]=useState(10);
        const [taxR,setTaxR]=useState(21);

        // CAPEX split: capture equipment qualifies for MACRS-7; pipeline + injection wells
        // are typically MACRS-15 / longer-lived. We use MACRS-7 for capture, straight-line over
        // operating life for the rest as a reasonable simplification.
        const captureCapex = cxCapture * 1e6 * (1 + contingency/100);
        const otherCapex   = (cxPipe + cxInj) * 1e6 * (1 + contingency/100);
        const totalCapex   = captureCapex + otherCapex;
        const equityAmt    = totalCapex * eqPct / 100;
        const debtAmt      = totalCapex * (100 - eqPct) / 100;
        const dr           = dRate / 100;
        const ann_ds       = dr > 0 ? debtAmt * dr * Math.pow(1+dr,dTerm) / (Math.pow(1+dr,dTerm)-1) : debtAmt/dTerm;
        const opYrs        = Math.max(1, projLife - constYrs);
        // MACRS-7 half-year convention
        const MACRS7 = [0.1429, 0.2449, 0.1749, 0.1249, 0.0893, 0.0892, 0.0893, 0.0446];
        const slDepOther = otherCapex / opYrs;
        // Build year-by-year cash flow with: 45Q capped at 12 yrs, MACRS-7 for capture,
        // construction period CAPEX drawdown, debt amortization
        const cashflowYears = [];
        let debtBal = debtAmt;
        for (let y = 0; y < projLife; y++) {
          if (y < constYrs) {
            cashflowYears.push({ phase:'C', y:y+1, rev:0, opex:0, ebitda:0, dep:0, interest:0, principal:0, ds:0, tax:0, fcf:-equityAmt/constYrs });
            continue;
          }
          const t = y - constYrs; // 0-indexed operating year
          const r45 = t < 12 ? r45q : 0;
          const rev_y = co2tpy * (r45 + tierR + vcmR);
          const opex_y = co2tpy * opexT + monit * 1e6;
          const ebitda_y = rev_y - opex_y;
          const depCapture = t < 8 ? captureCapex * MACRS7[t] : 0;
          const dep_y = depCapture + slDepOther;
          let interest_y = 0, principal_y = 0, ds_y = 0;
          if (t < dTerm && debtBal > 0) {
            interest_y = debtBal * dr;
            principal_y = Math.min(debtBal, ann_ds - interest_y);
            ds_y = interest_y + principal_y;
            debtBal -= principal_y;
          }
          const ebt_y = ebitda_y - dep_y - interest_y;
          const tax_y = Math.max(0, ebt_y * taxR/100);
          const fcf_y = ebitda_y - tax_y - ds_y;
          cashflowYears.push({ phase:'O', y:t+1, rev:rev_y, opex:opex_y, ebitda:ebitda_y, dep:dep_y, interest:interest_y, principal:principal_y, ds:ds_y, tax:tax_y, fcf:fcf_y });
        }
        const cfs = cashflowYears.map(c=>c.fcf);
        const irr = calcIRR(cfs);
        const npv = calcNPV(cfs,wacc);
        // Year-1 operating values for display
        const op1 = cashflowYears.find(c=>c.phase==='O') || { rev:0, opex:0, ebitda:0, ds:0, tax:0, fcf:0 };
        const annRev = op1.rev, annOpex = op1.opex, annEBITDA = op1.ebitda;
        const dscr = ann_ds > 0 ? annEBITDA / ann_ds : Infinity;
        let payback=null, cum=0;
        for (let i=0;i<cashflowYears.length;i++) { cum += cashflowYears[i].fcf; if (cum>=0 && payback===null) payback = i+1; }
        // Breakeven 45Q rate (rebuilds the year-by-year model)
        const buildCFs = (q) => {
          const cf = []; let db = debtAmt;
          for (let y=0;y<projLife;y++) {
            if (y<constYrs) { cf.push(-equityAmt/constYrs); continue; }
            const t = y - constYrs;
            const r45_t = t<12 ? q : 0;
            const rev_t = co2tpy*(r45_t+tierR+vcmR);
            const ebitda_t = rev_t - (co2tpy*opexT + monit*1e6);
            const dep_t = (t<8?captureCapex*MACRS7[t]:0) + slDepOther;
            let int_t=0, ds_t=0;
            if (t<dTerm && db>0) { int_t = db*dr; const pr_t = Math.min(db, ann_ds - int_t); ds_t = int_t + pr_t; db -= pr_t; }
            const tax_t = Math.max(0, (ebitda_t - dep_t - int_t) * taxR/100);
            cf.push(ebitda_t - tax_t - ds_t);
          }
          return cf;
        };
        let be45 = r45q;
        for (let q=0; q<=400; q+=1) {
          if (calcNPV(buildCFs(q), wacc) >= 0) { be45 = q; break; }
        }
        const irrPct = isNaN(irr)||!isFinite(irr) ? 'N/A' : (irr*100).toFixed(1)+'%';
        const irrCol = irr>0.12 ? '#60d080' : irr>0.08 ? GOLD : '#d06060';
        const dscrCol = dscr>=1.4 ? '#60d080' : dscr>=1.25 ? GOLD : '#d06060';
        const smallInput={...inputStyle,padding:'4px 8px'};

        return React.createElement('div',null,
          React.createElement('div',{style:{display:'grid',gridTemplateColumns:isMobile?'1fr':'280px 1fr',gap:12}},
            React.createElement('div',{style:panelStyle},
              React.createElement('div',{style:{fontWeight:700,color:GOLD,fontSize:'0.85em',marginBottom:10}},'📋 Project Inputs'),
              React.createElement('div',{style:{color:GOLD,fontSize:'0.7em',fontWeight:700,marginTop:4,marginBottom:4,borderBottom:'1px solid '+GOLD_BORDER,paddingBottom:2}},'CAPEX ($M)'),
              ...[{l:'Capture Plant',v:cxCapture,s:setCxCapture},{l:'Pipeline & Compression',v:cxPipe,s:setCxPipe},{l:'Injection Well(s)',v:cxInj,s:setCxInj}].map((f,i)=>
                React.createElement('div',{key:i,style:{marginBottom:6}},
                  React.createElement('label',{style:labelStyle},f.l),
                  React.createElement('input',{type:'number',value:f.v,onChange:e=>f.s(+e.target.value),style:smallInput,step:10})
                )
              ),
              React.createElement('div',{style:{marginBottom:6}},
                React.createElement('label',{style:labelStyle},'Contingency (%)'),
                React.createElement('input',{type:'number',value:contingency,onChange:e=>setContingency(+e.target.value),style:smallInput,min:0,max:50})
              ),
              React.createElement('div',{style:{color:GOLD,fontSize:'0.7em',fontWeight:700,marginTop:6,marginBottom:4,borderBottom:'1px solid '+GOLD_BORDER,paddingBottom:2}},'OPEX'),

    /* ── PDF export ── */
    function exportChatToPDF(messages) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4' });
      const W = doc.internal.pageSize.getWidth();
      const margin = 14;
      let y = 20;

      doc.setFillColor(7,15,10);
      doc.rect(0,0,W,14,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.setTextColor(125,223,176);
      doc.text('CCUS Compass — AI Advisor Chat History', margin, 10);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.setTextColor(90,122,104);
      doc.text('Exported: ' + new Date().toLocaleString() + '  ·  ccus.ca  ·  SubsurfaceAI', W - margin, 10, { align:'right' });

      y = 24;
      messages.forEach((m) => {
        const isUser = m.role === 'user';
        const label = isUser ? 'You' : 'AI Advisor (Claude)';
        const plain = m.content.replace(/[*#`_~\[\]]/g,'').replace(/\n+/g,'\n');
        const lines = doc.splitTextToSize(plain, W - margin * 2 - 4);
        const blockH = lines.length * 5 + 10;
        if (y + blockH > 280) { doc.addPage(); y = 16; }
        doc.setFillColor(isUser ? 18 : 11, isUser ? 42 : 24, isUser ? 26 : 15);
        doc.roundedRect(margin, y, W - margin*2, blockH, 2, 2, 'F');
        doc.setFont('helvetica','bold');
        doc.setFontSize(8);
        doc.setTextColor(isUser ? 200 : 125, isUser ? 220 : 223, isUser ? 200 : 176);
        doc.text(label, margin + 3, y + 6);
        doc.setFont('helvetica','normal');
        doc.setFontSize(9);
        doc.setTextColor(190, 210, 200);
        doc.text(lines, margin + 3, y + 12);
        y += blockH + 4;
      });

      doc.save('ccus-compass-chat-' + Date.now() + '.pdf');
    }

    /* ─────────────── REGULATORY CONTEXT INJECTION ─────────────── */

    function buildRegContext(query, items) {
      if (!items || items.length === 0) return '';
      const q = query.toLowerCase();
      const keywords = q.split(/\s+/).filter(w => w.length > 3);
      // Domain-specific high-value keyword boosts
      const BOOSTS = [
        ['45q','45q'],['class vi','class vi'],['class 6','class vi'],['aer ','aer '],
        ['d-065','d-065'],['d065','d-065'],['subpart rr','subpart rr'],['tier ','tier '],
        ['epa ','epa '],['mrv','mrv'],['phmsa','phmsa'],['sequestration','sequestration'],
        ['primacy','primacy'],['alberta','alberta'],['bcogc','bcogc'],['eu ccs','eu ccs'],
        ['45v','45v'],['inflation reduction','45q'],['endangerment','endangerment'],
        ['moratorium','moratorium'],['obbba','obbba'],['permit','permit'],
      ];
      const scored = items.map(item => {
        const haystack = (item.title + ' ' + item.desc + ' ' + item.tag + ' ' + (item.jurisdiction||'')).toLowerCase();
        let score = keywords.filter(kw => haystack.includes(kw)).length;
        BOOSTS.forEach(([qkw, hkw]) => { if (q.includes(qkw) && haystack.includes(hkw)) score += 3; });
        if (item.severity === 'critical') score += 1;
        return { item, score };
      }).filter(s => s.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3)
        .map(s => s.item);

      if (scored.length === 0) return '';

      const lines = scored.map(i =>
        `• [${i.date}] **${i.title}** (${i.tag})\n  ${i.desc}\n  Source: ${i.url || 'N/A'}`
      ).join('\n\n');

      return '\n\n---\n**LIVE REGULATORY CONTEXT** (auto-injected from CCUS Compass Regulatory Tracker):\n\n' +
        lines + '\n\n' +
        'These items are from the tracker and may post-date your knowledge cutoff. Use them as authoritative context for your response. Items from "Federal Register (Live)" were fetched in real-time this session.\n---';
    }

    /* ─────────────── MAIN APP ─────────────── */

    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem('ccus-theme') || 'dark');
      const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
      useEffect(() => {
        const h = () => setIsMobile(window.innerWidth <= 768);
        window.addEventListener('resize', h);
        return () => window.removeEventListener('resize', h);
      }, []);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('ccus_api_key') || '');
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [view, setView] = useState('home');
      const [activeTab, setActiveTab] = useState('alberta');
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [userLevel, setUserLevel] = useState('engineer');

      // ── Auth state ──
      const [user, setUser] = useState(null);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [chatSessions, setChatSessions] = useState([]);
      const [currentSessionId, setCurrentSessionId] = useState(null);
      const [showHistory, setShowHistory] = useState(false);

      // ── Refs so stale useCallback closures always read latest values ──
      const userRef = useRef(null);
      const sessionIdRef = useRef(null);
      useEffect(() => { userRef.current = user; }, [user]);
      useEffect(() => { sessionIdRef.current = currentSessionId; }, [currentSessionId]);

      // ── Auth listener + session restore ──
      useEffect(() => {
        SUPA.auth.getSession().then(({ data:{ session } }) => {
          if (session?.user) { setUser(session.user); userRef.current = session.user; loadSessions(session.user.id, true); }
        });
        const { data:{ subscription } } = SUPA.auth.onAuthStateChange((_e, session) => {
          const u = session?.user ?? null;
          setUser(u); userRef.current = u;
          if (u) loadSessions(u.id, true);
          else { setChatSessions([]); setCurrentSessionId(null); sessionIdRef.current = null; setMessages([]); }
        });
        return () => subscription.unsubscribe();
      }, []);

      async function loadSessions(uid, autoRestore) {
        const { data } = await SUPA.from('chat_sessions')
          .select('id,title,created_at,updated_at')
          .eq('user_id', uid)
          .order('updated_at', { ascending:false })
          .limit(30);
        setChatSessions(data || []);
        // Auto-restore the most recent session on sign-in / page refresh
        if (autoRestore && data && data.length > 0) {
          loadSession(data[0].id);
        }
      }

      async function loadSession(id) {
        const { data } = await SUPA.from('chat_sessions').select('messages').eq('id', id).single();
        if (data) {
          setMessages(data.messages || []);
          setCurrentSessionId(id);
          sessionIdRef.current = id;
          setShowHistory(false);
        }
      }

      // ── Save directly via refs — bypasses stale closure issue ──
      async function persistSession(msgs, uid, sessId) {
        if (!uid) return;
        const title = msgs.find(m=>m.role==='user')?.content?.slice(0,60) || 'New session';
        if (sessId) {
          await SUPA.from('chat_sessions')
            .update({ messages:msgs, updated_at:new Date().toISOString() })
            .eq('id', sessId);
        } else {
          const { data, error } = await SUPA.from('chat_sessions')
            .insert({ user_id:uid, title, messages:msgs })
            .select('id').single();
          if (data && !error) {
            setCurrentSessionId(data.id);
            sessionIdRef.current = data.id;
            loadSessions(uid, false);
          }
        }
      }

      async function deleteSession(id) {
        await SUPA.from('chat_sessions').delete().eq('id', id);
        if (id === currentSessionId) { setMessages([]); setCurrentSessionId(null); sessionIdRef.current = null; }
        setChatSessions(p => p.filter(s => s.id !== id));
      }

      function newChat() {
        setMessages([]); setCurrentSessionId(null);
        sessionIdRef.current = null; setShowHistory(false);
      }

      async function signOut() { await SUPA.auth.signOut(); setUser(null); userRef.current = null; newChat(); }

      const chatEnd = useRef(null);
      const mapContainerRef = useRef(null);
      const mapInstanceRef  = useRef(null);
      const mapInitRef      = useRef(false);
      const [mapColorProp, setMapColorProp] = useState('CO2_P50_Mt');
      const [selectedCell,  setSelectedCell]  = useState(null);
      const [mapDataLoaded, setMapDataLoaded] = useState(false);

      // ── Reg Tracker State ──
      const [trackerLiveItems, setTrackerLiveItems] = useState([]);
      const [trackerLoading, setTrackerLoading] = useState(false);
      const [trackerFilter, setTrackerFilter] = useState('all');
      const [trackerFetched, setTrackerFetched] = useState(false);
      const [trackerLiveFailed, setTrackerLiveFailed] = useState(false);
      const [trackerLastFetch, setTrackerLastFetch] = useState(null);
      const allTrackerItemsRef = useRef([]);

      useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

      // ── Fetch live Federal Register items when tracker tab opens ──
      const fetchTrackerLive = useCallback(async () => {
        setTrackerLoading(true);
        setTrackerLiveFailed(false);
        try {
          // Federal Register public JSON API — CORS-enabled, no proxy needed
          const apiUrl = 'https://www.federalregister.gov/api/v1/documents.json' +
            '?fields[]=title&fields[]=publication_date&fields[]=html_url&fields[]=abstract&fields[]=agencies' +
            '&conditions[term]=carbon+sequestration+geologic+storage+carbon+dioxide+injection' +
            '&conditions[type][]=RULE&conditions[type][]=PROPOSED_RULE&conditions[type][]=NOTICE' +
            '&per_page=6&order=newest';
          const res = await fetch(apiUrl);
          if (!res.ok) throw new Error('FR API error');
          const data = await res.json();
          const items = (data.results || []).map(d => ({
            id: 'live_' + (d.document_number || Math.random()),
            date: d.publication_date || '',
            title: d.title || 'Untitled',
            desc: d.abstract || 'No abstract available. View source for full details.',
            jurisdiction: 'federal',
            tag: 'US Federal',
            tagColor: '#5ba88a',
            severity: 'update',
            url: d.html_url || '#',
            source: 'Federal Register (Live)',
            live: true,
          }));
          setTrackerLiveItems(items);
          setTrackerLastFetch(new Date().toLocaleTimeString());
        } catch(e) {
          setTrackerLiveFailed(true);
          setTrackerLiveItems([]);
        }
        setTrackerLoading(false);
        setTrackerFetched(true);
      }, []);

      // Auto-fetch when tracker or chat view is first opened
      useEffect(() => {
        if ((view === 'tracker' || view === 'chat') && !trackerFetched) {
          fetchTrackerLive();
        }
      }, [view, trackerFetched, fetchTrackerLive]);

      const send = useCallback(async (text) => {
        if (!text.trim() || loading) return;
        if (!apiKey || apiKey === 'BROWSE_ONLY') { setShowKeyModal(true); return; }

        const userMsg = { role:'user', content:text.trim() };
        const next = [...messages, userMsg];
        setMessages(next);
        setInput('');
        setLoading(true);

        const levelCtx = userLevel==='engineer' ? 'User is a technical engineer. Full technical depth, specific clause numbers, engineering parameters.'
          : userLevel==='regulator' ? 'User is a regulator. Focus on compliance pathways, enforcement mechanisms.'
          : 'User is an investor/developer. Focus on economics, risk profiles, timelines, commercial viability.';

        // Auto-inject relevant tracker items as context if query matches
        const regContext = buildRegContext(text.trim(), allTrackerItemsRef.current);

        try {
          const r = await fetch('https://api.anthropic.com/v1/messages', {
            method:'POST',
            headers: { 'Content-Type':'application/json', 'x-api-key': apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
            body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:4000, system: SYS_PROMPT + '\n\n' + levelCtx + regContext, messages: next.slice(-12).map(m=>({role:m.role,content:m.content})) })
          });
          if (r.status === 401) {
            setMessages(p => [...p, { role:'assistant', content:'⚠️ **Invalid API key.** Please check your key and try again. Go to [console.anthropic.com](https://console.anthropic.com/) to verify.' }]);
            setLoading(false); return;
          }
          const d = await r.json();
          if (!r.ok) {
            const errMsg = d?.error?.message || `API error (${r.status})`;
            setMessages(p => [...p, { role:'assistant', content:`⚠️ **API Error:** ${errMsg}` }]);
            setLoading(false); return;
          }
          const txt = d.content?.map(b=>b.text||'').join('\n') || 'No response received.';
          const finalMsgs = [...next, { role:'assistant', content:txt }];
          setMessages(finalMsgs);
          // Use refs — always reads latest user/sessionId regardless of closure age
          persistSession(finalMsgs, userRef.current?.id, sessionIdRef.current);
        } catch(e) {
          setMessages(p => [...p, { role:'assistant', content:'⚠️ **Connection error.** Check your network. If this persists, your API key may be invalid or you may have hit rate limits.' }]);
        }
        setLoading(false);
      }, [messages, loading, apiKey, userLevel]);

      // ── Basin Map: init when tab opens, destroy on leave ──
      const [mapStatus, setMapStatus] = useState('');

      useEffect(() => {
        if (view !== 'map') {
          if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; }
          setMapDataLoaded(false); setSelectedCell(null); setMapStatus('');
          return;
        }
        const t = setTimeout(() => {
          if (!mapContainerRef.current || mapInstanceRef.current) return;

          const map = new maplibregl.Map({
            container: mapContainerRef.current,
            style: {
              version: 8,
              glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
              sources: {
                carto: { type:'raster', tileSize:256, maxzoom:19,
                  attribution:'© CARTO · © OpenStreetMap contributors',
                  tiles:[
                    'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                    'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                    'https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                    'https://d.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
                  ] }
              },
              layers: [
                { id:'bg',   type:'background', paint:{'background-color':'#e8ede8'} },
                { id:'topo', type:'raster', source:'carto' }
              ]
            },
            center: [-98, 45], zoom: 3.0, maxZoom: 14, minZoom: 2
          });
          mapInstanceRef.current = map;

          map.on('error', e => { setMapStatus('Map error: ' + (e.error && e.error.message || 'unknown')); });

          map.on('load', () => {
            // Add source with empty collection — will be filled by fetch below
            map.addSource('natcarb', { type:'geojson', data:{ type:'FeatureCollection', features:[] }, generateId: true });
            map.addLayer({ id:'natcarb-fill', type:'fill', source:'natcarb',
              paint:{ 'fill-color': getColorExpression('CO2_P50_Mt'), 'fill-opacity': 0.7 } });
            map.addLayer({ id:'natcarb-outline', type:'line', source:'natcarb',
              paint:{ 'line-color':'rgba(0,60,0,0.35)', 'line-width':1 } });
            map.addLayer({ id:'natcarb-hover', type:'fill', source:'natcarb',
              paint:{ 'fill-color':'#ffffff',
                'fill-opacity':['case',['boolean',['feature-state','hover'],false],0.25,0] } });
            map.addLayer({ id:'natcarb-selected', type:'line', source:'natcarb',
              paint:{ 'line-color':'#1a5a3a', 'line-width':2.5,
                'line-opacity':['case',['boolean',['feature-state','selected'],false],1,0] } });

            // Dismiss the full-screen overlay immediately — map canvas is ready
            setMapDataLoaded(true);
            setMapStatus('Loading NATCARB polygons…');

            // Fetch and render the real polygon GeoJSON
            fetch(NATCARB_GEOJSON_URL)
              .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
              .then(data => {
                if (!mapInstanceRef.current) return;
                map.getSource('natcarb').setData(data);
                setMapStatus('');
              })
              .catch(err => { setMapStatus('⚠ ' + err.message); });

            // ── Event handlers ──
            let hId=null, sId=null;
            map.on('mousemove','natcarb-fill', e => {
              if (!e.features.length) return;
              if (hId!==null) map.setFeatureState({source:'natcarb',id:hId},{hover:false});
              hId = e.features[0].id;
              map.setFeatureState({source:'natcarb',id:hId},{hover:true});
              map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave','natcarb-fill', () => {
              if (hId!==null) map.setFeatureState({source:'natcarb',id:hId},{hover:false});
              hId=null; map.getCanvas().style.cursor='';
            });
            map.on('click','natcarb-fill', e => {
              if (!e.features.length) return;
              if (sId!==null) map.setFeatureState({source:'natcarb',id:sId},{selected:false});
              sId = e.features[0].id;
              map.setFeatureState({source:'natcarb',id:sId},{selected:true});
              setSelectedCell(e.features[0].properties);
            });
            map.on('click', e => {
              if (!map.queryRenderedFeatures(e.point,{layers:['natcarb-fill']}).length) {
                if (sId!==null) map.setFeatureState({source:'natcarb',id:sId},{selected:false});
                sId=null; setSelectedCell(null);
              }
            });
          });
        }, 80);
        return () => clearTimeout(t);
      }, [view]);

      // ── Update fill color when property selector changes ──
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        try { if (map.getLayer('natcarb-fill')) map.setPaintProperty('natcarb-fill','fill-color',getColorExpression(mapColorProp)); } catch(e){}
      }, [mapColorProp]);

      const keyDown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(input); } };

          React.createElement('a', { href:item.url, target:'_blank', rel:'noopener', onClick:e=>e.stopPropagation(),

        const cfg = {

          React.createElement('span', null, 'CCUS Compass · Knowledge to Aug 2025 · Paste new regulatory text for post-cutoff analysis · Not legal/regulatory advice'),
          React.createElement('span', null, 'Built for the global CCUS community · ',
            React.createElement('a', { href:'https://github.com/tchisti/ccus-space', target:'_blank', rel:'noopener', style:{color:'#3a5a48'} }, 'GitHub ↗')
          )

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
